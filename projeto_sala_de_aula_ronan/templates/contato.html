{% extends "template.html" %}

{% block titulo %}
Contato
{% endblock %}

{% block conteudo %}
<div class="container">
    <h1 class="display-4">Fale Conosco</h1>
    <p class="lead">
        Aqui você pode entrar em contato conosco para dúvidas, sugestões ou suporte.
    </p>

    <h2 class="display-5 mt-4">Formulário de Contato</h2>
    <form>
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" placeholder="Seu nome">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="Seu e-mail">
        </div>
        <div class="mb-3">
            <label for="mensagem" class="form-label">Mensagem</label>
            <textarea class="form-control" id="mensagem" rows="5" placeholder="Escreva sua mensagem"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
    </form>

    <h2 class="display-5 mt-4">Imagem ilustrativa</h2>
    <img src="{{ url_for('static', filename='imgs/contato-placeholder.jpg') }}" 
         alt="Imagem contato" 
         class="img-principal">

    <a href="/inicio" class="btn btn-primary mt-4">Voltar ao Início</a>
</div>
{% endblock %}
